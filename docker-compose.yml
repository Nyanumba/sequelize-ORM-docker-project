version: '3.8'

services:
  app:
    build: .
    container_name: customer_app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=sequelizecontainer_db
      - DB_USER=postgres
      - DB_PASSWORD=your_postgres_password
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start 

  db:
    image: postgres:15-alpine
    container_name: customer_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sequelizecontainer_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=your_postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: